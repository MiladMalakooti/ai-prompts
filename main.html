<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Higher Ed Prompt Builder</title>
  <style>
    :root{
      --bg:#0b0c10;
      --panel:#11131a;
      --panel2:#0f1117;
      --text:#e7e9ee;
      --muted:#aab0bd;
      --border:#2a2f3a;
      --accent:#6ea8ff;
      --danger:#ff6b6b;
      --ok:#7ee787;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: linear-gradient(180deg, var(--bg), #07080b);
      color:var(--text);
      line-height:1.35;
    }
    .wrap{
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
    }
    h1{
      margin: 0 0 10px 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }
    .sub{
      margin: 0 0 18px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .card{
      background: rgba(17,19,26,0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
      min-height: 200px;
    }
    .card h2{
      margin:0 0 10px 0;
      font-size: 14px;
      font-weight: 650;
      color: var(--text);
    }
    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    label{
      display:block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    select, textarea, input[type="text"]{
      width:100%;
      padding: 10px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(15,17,23,0.9);
      color: var(--text);
      outline: none;
    }
    select:focus, textarea:focus, input[type="text"]:focus{
      border-color: rgba(110,168,255,0.65);
      box-shadow: 0 0 0 3px rgba(110,168,255,0.15);
    }
    textarea{ min-height: 92px; resize: vertical; }
    .small textarea{ min-height: 72px; }
    .pillbox{
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }
    .pill{
      display:flex;
      align-items:center;
      gap: 8px;
      border: 1px solid var(--border);
      background: rgba(15,17,23,0.65);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--text);
      user-select:none;
    }
    .pill input{ margin:0; }
    .hint{
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .bar{
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .btns{
      display:flex;
      gap: 10px;
      align-items:center;
    }
    button{
      border: 1px solid var(--border);
      background: rgba(15,17,23,0.9);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }
    button:hover{ border-color: rgba(110,168,255,0.5); }
    button.primary{
      border-color: rgba(110,168,255,0.65);
      background: rgba(110,168,255,0.12);
    }
    .status{
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }
    .status.ok{ color: var(--ok); }
    .status.bad{ color: var(--danger); }
    .output{
      width:100%;
      min-height: 420px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    .checks{
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .checkline{
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap: 10px;
      align-items:flex-start;
      margin: 6px 0;
    }
    .dot{
      width: 8px;
      height: 8px;
      border-radius: 999px;
      margin-top: 5px;
      background: var(--muted);
      flex: 0 0 auto;
    }
    .dot.ok{ background: var(--ok); }
    .dot.bad{ background: var(--danger); }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
      .row{ grid-template-columns: 1fr; }
      .output{ min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Higher Ed Prompt Builder (Deterministic)</h1>
    <p class="sub">Pick options; paste minimal details; copy the compiled prompt into your AI chat.</p>

    <div class="grid">
      <section class="card">
        <h2>Inputs</h2>

        <div class="row">
          <div>
            <label for="taskType">Task type</label>
            <select id="taskType">
              <option value="email">Email draft</option>
              <option value="meeting_summary">Meeting summary</option>
              <option value="action_items">Action items tracker</option>
              <option value="policy_summary">Policy summary</option>
              <option value="process_checklist">Process checklist</option>
              <option value="faq_entry">FAQ entry</option>
            </select>
          </div>

          <div>
            <label for="audience">Audience</label>
            <select id="audience">
              <option value="faculty">Faculty</option>
              <option value="students">Students</option>
              <option value="staff">Staff</option>
              <option value="leadership">Leadership</option>
              <option value="external">External partner</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="tone">Tone</label>
            <select id="tone">
              <option value="neutral_professional">Neutral professional</option>
              <option value="formal">Formal</option>
              <option value="friendly_professional">Friendly professional</option>
              <option value="direct_concise">Direct concise</option>
            </select>
          </div>

          <div>
            <label for="length">Length</label>
            <select id="length">
              <option value="short">Short</option>
              <option value="medium" selected>Medium</option>
              <option value="detailed">Detailed</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="outputFormat">Output format</label>
            <select id="outputFormat">
              <option value="auto" selected>Auto based on task</option>
              <option value="bullets">Bullet list</option>
              <option value="numbered_steps">Numbered steps</option>
              <option value="email_with_subject">Email with subject line</option>
              <option value="exec_summary_actions">Executive summary plus actions</option>
              <option value="checklist_owners_deadlines">Checklist with owners and deadlines</option>
            </select>
          </div>

          <div>
            <label for="systems">Systems context (Ctrl or Cmd for multi-select)</label>
            <select id="systems" multiple size="4">
              <option value="Canvas">Canvas</option>
              <option value="Slate">Slate</option>
              <option value="Banner">Banner</option>
              <option value="PeopleSoft">PeopleSoft</option>
              <option value="Google Workspace">Google Workspace</option>
              <option value="Microsoft 365">Microsoft 365</option>
              <option value="Panopto">Panopto</option>
            </select>
            <div class="hint">Optional; selects appear in the compiled context line.</div>
          </div>
        </div>

        <div>
          <label>Sensitivity constraints</label>
          <div class="pillbox">
            <label class="pill"><input type="checkbox" id="ferpa" /> FERPA sensitive</label>
            <label class="pill"><input type="checkbox" id="security" /> Security sensitive</label>
            <label class="pill"><input type="checkbox" id="hr" /> HR sensitive</label>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="row">
          <div>
            <label for="goal">Goal (one line)</label>
            <input id="goal" type="text" placeholder="Example: Announce Panopto rollout and request branding input." />
          </div>
          <div>
            <label for="institution">Institution context (optional)</label>
            <input id="institution" type="text" placeholder="Example: University IT or Registrar’s Office." />
          </div>
        </div>

        <div class="row">
          <div class="small">
            <label for="keyDetails">Key details (minimal)</label>
            <textarea id="keyDetails" placeholder="Include dates, names, links, constraints, required sections, and any must-include points."></textarea>
          </div>
          <div class="small">
            <label for="doNotInclude">Do not include (optional)</label>
            <textarea id="doNotInclude" placeholder="Example: Do not mention vendor pricing; do not share internal incident details."></textarea>
          </div>
        </div>

        <div>
          <label for="sourceText">Source text to process (optional paste)</label>
          <textarea id="sourceText" placeholder="Paste meeting notes, policy excerpts, email thread, or any raw text."></textarea>
        </div>

        <div class="checks" id="checks"></div>
      </section>

      <section class="card">
        <div class="bar">
          <h2 style="margin:0;">Compiled prompt</h2>
          <div class="btns">
            <button class="primary" id="copyBtn" type="button">Copy to clipboard</button>
            <button id="resetBtn" type="button">Reset</button>
          </div>
        </div>

        <textarea id="output" class="output" readonly></textarea>
        <div id="status" class="status"></div>
      </section>
    </div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);

    const TASK_TEMPLATES = {
      email: {
        taskLabel: "Draft an email",
        defaultOutput: "email_with_subject",
        schema: [
          "Subject line",
          "Greeting",
          "Body: 2 short paragraphs",
          "Bullet next steps",
          "Closing"
        ]
      },
      meeting_summary: {
        taskLabel: "Summarize a meeting",
        defaultOutput: "exec_summary_actions",
        schema: [
          "Summary: 3 to 5 sentences",
          "Decisions",
          "Action items with owner and deadline",
          "Open questions"
        ]
      },
      action_items: {
        taskLabel: "Extract and structure action items",
        defaultOutput: "checklist_owners_deadlines",
        schema: [
          "Action item",
          "Owner",
          "Deadline",
          "Dependencies",
          "Status assumptions clearly labeled"
        ]
      },
      policy_summary: {
        taskLabel: "Summarize a policy",
        defaultOutput: "bullets",
        schema: [
          "Purpose",
          "Who it applies to",
          "Key requirements",
          "What changes operationally",
          "Risks and compliance notes",
          "Recommended next steps"
        ]
      },
      process_checklist: {
        taskLabel: "Create an operational checklist",
        defaultOutput: "numbered_steps",
        schema: [
          "Prerequisites",
          "Step-by-step procedure",
          "Validation checks",
          "Escalation path",
          "Artifacts to produce"
        ]
      },
      faq_entry: {
        taskLabel: "Write an FAQ entry",
        defaultOutput: "bullets",
        schema: [
          "Question",
          "Short answer",
          "Details",
          "Where to go for help"
        ]
      }
    };

    const TONE_MAP = {
      formal: "Formal; institutional style; avoid contractions.",
      neutral_professional: "Neutral professional; clear; operational.",
      friendly_professional: "Friendly professional; supportive; still concise.",
      direct_concise: "Direct and concise; prioritize actionable content."
    };

    const LENGTH_MAP = {
      short: "Keep it brief; minimize background; prioritize essentials.",
      medium: "Provide adequate detail; include key context and steps.",
      detailed: "Be thorough; include edge cases and operational checks."
    };

    const OUTPUT_MAP = {
      auto: "Use the default schema for the selected task type.",
      bullets: "Use bullet points; group by headings.",
      numbered_steps: "Use numbered steps; include prerequisites and validation.",
      email_with_subject: "Produce an email with a subject line and a professional structure.",
      exec_summary_actions: "Include an executive summary plus decisions and action items.",
      checklist_owners_deadlines: "Provide a checklist with owner and deadline fields."
    };

    function selectedOptions(selectEl){
      return Array.from(selectEl.selectedOptions).map(o => o.value);
    }

    function buildConstraints(){
      const constraints = [];
      const audience = el("audience").value;
      const tone = el("tone").value;
      const length = el("length").value;

      constraints.push(`Tone: ${TONE_MAP[tone]}`);
      constraints.push(`Audience: ${audience}. Use terminology appropriate for that audience.`);
      constraints.push(`Length: ${LENGTH_MAP[length]}`);
      constraints.push("Avoid speculation; rely only on provided inputs. If something is missing, ask targeted questions at the end.");

      if (el("ferpa").checked){
        constraints.push("FERPA: Do not request, include, or infer student PII. Use anonymized placeholders if needed.");
      }
      if (el("security").checked){
        constraints.push("Security: Do not include sensitive security details. Provide safe, general guidance only.");
      }
      if (el("hr").checked){
        constraints.push("HR: Avoid personal data and subjective judgments; use neutral, policy-aligned language.");
      }

      const dni = el("doNotInclude").value.trim();
      if (dni) constraints.push(`Do not include: ${dni}`);

      return constraints;
    }

    function buildOutputSpec(taskKey){
      const chosen = el("outputFormat").value;
      const t = TASK_TEMPLATES[taskKey];

      if (chosen === "auto"){
        return {
          mode: t.defaultOutput,
          note: OUTPUT_MAP["auto"],
          schema: t.schema
        };
      }
      return {
        mode: chosen,
        note: OUTPUT_MAP[chosen] || "Use the selected format.",
        schema: t.schema
      };
    }

    function compilePrompt(){
      const taskKey = el("taskType").value;
      const t = TASK_TEMPLATES[taskKey];

      const institution = el("institution").value.trim();
      const goal = el("goal").value.trim();
      const systems = selectedOptions(el("systems"));
      const keyDetails = el("keyDetails").value.trim();
      const sourceText = el("sourceText").value.trim();

      const contextParts = [];
      if (institution) contextParts.push(institution);
      if (systems.length) contextParts.push(`Systems: ${systems.join(", ")}`);

      const constraints = buildConstraints();
      const out = buildOutputSpec(taskKey);

      const sections = [];

      sections.push("Role:\nYou are an administrative assistant supporting operations in a higher education institution.");
      sections.push(`Context:\n${contextParts.length ? contextParts.join(". ") + "." : "Higher education administrative environment; follow standard governance and communication norms."}`);
      sections.push(`Task:\n${t.taskLabel}${goal ? ` to achieve the following goal: ${goal}` : "."}`);

      const inputs = [];
      if (keyDetails) inputs.push(`Key details:\n${keyDetails}`);
      if (sourceText) inputs.push(`Source text:\n${sourceText}`);
      sections.push(`Inputs:\n${inputs.length ? inputs.join("\n\n") : "No additional input provided. Ask for the minimum information required to complete the task."}`);

      sections.push("Constraints:\n" + constraints.map(c => `- ${c}`).join("\n"));

      const outLines = [];
      outLines.push(`Format directive:\n- ${out.note}`);
      outLines.push("Output structure:");
      (out.schema || []).forEach(s => outLines.push(`- ${s}`));
      sections.push(outLines.join("\n"));

      sections.push("Quality criteria:\n- Clear, actionable language.\n- Organized for operational use.\n- Use concrete dates, names, and links when provided.");

      return sections.join("\n\n");
    }

    function renderChecks(){
      const checks = [];
      const taskKey = el("taskType").value;
      const goal = el("goal").value.trim();
      const keyDetails = el("keyDetails").value.trim();
      const sourceText = el("sourceText").value.trim();

      const audienceOk = !!el("audience").value;
      const goalOk = goal.length >= 8;
      const inputsOk = (keyDetails.length >= 10) || (sourceText.length >= 20);

      checks.push({ ok: audienceOk, msg: "Audience selected." });
      checks.push({ ok: goalOk, msg: "Goal provided (recommended)." });
      checks.push({ ok: inputsOk, msg: "Some input material provided (key details or source text)." });

      if (taskKey === "email" && el("outputFormat").value === "bullets"){
        checks.push({ ok: false, msg: "Email task usually benefits from email format; consider Email with subject line." });
      }

      const container = el("checks");
      container.innerHTML = "<div style='font-size:12px;color:var(--muted);margin-bottom:6px;'>Prompt quality checks</div>" +
        checks.map(c => {
          const cls = c.ok ? "ok" : "bad";
          return `<div class="checkline"><span class="dot ${cls}"></span><span>${c.msg}</span></div>`;
        }).join("");

      const okCount = checks.filter(c => c.ok).length;
      const status = el("status");
      if (okCount === checks.length){
        status.className = "status ok";
        status.textContent = "Ready to copy.";
      } else {
        status.className = "status";
        status.textContent = "You can still copy; add missing info to improve results.";
      }
    }

    function update(){
      el("output").value = compilePrompt();
      renderChecks();
    }

    async function copyToClipboard(){
      const text = el("output").value;
      const status = el("status");

      try{
        if (navigator.clipboard && navigator.clipboard.writeText){
          await navigator.clipboard.writeText(text);
        } else {
          el("output").focus();
          el("output").select();
          document.execCommand("copy");
          window.getSelection().removeAllRanges();
        }
        status.className = "status ok";
        status.textContent = "Copied to clipboard.";
      } catch (e){
        status.className = "status bad";
        status.textContent = "Copy failed. Select the text and copy manually.";
      }
    }

    function resetAll(){
      el("taskType").value = "email";
      el("audience").value = "faculty";
      el("tone").value = "neutral_professional";
      el("length").value = "medium";
      el("outputFormat").value = "auto";
      Array.from(el("systems").options).forEach(o => o.selected = false);
      el("ferpa").checked = false;
      el("security").checked = false;
      el("hr").checked = false;
      el("goal").value = "";
      el("institution").value = "";
      el("keyDetails").value = "";
      el("doNotInclude").value = "";
      el("sourceText").value = "";
      update();
      const status = el("status");
      status.className = "status";
      status.textContent = "";
    }

    // Wire events
    ["taskType","audience","tone","length","outputFormat","systems","ferpa","security","hr","goal","institution","keyDetails","doNotInclude","sourceText"]
      .forEach(id => el(id).addEventListener("input", update));

    el("copyBtn").addEventListener("click", copyToClipboard);
    el("resetBtn").addEventListener("click", resetAll);

    // Initial render
    update();
  </script>
</body>
</html>
